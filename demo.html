<title>ОРАКУЛ SHAMBALA</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&display=swap" rel="stylesheet">
<style>
    :root {
        --bg-main: #101115;
        --bg-panel: #1a1c23;
        --yellow-accent: #fcd34d;
        --yellow-glow: rgba(252, 211, 77, 0.6);
        --text-dir: #3b82f6; /* Синий для Направления */
        --text-state: #f97316; /* Оранжевый для Состояния */
        --text-msg: #a855f7; /* Фиолетовый для Послания */
    }

    body {
        font-family: 'Oswald', sans-serif;
        background-color: var(--bg-main);
        color: #ffffff;
        margin: 0;
        padding: 20px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    /* Заголовки */
    .header-titles {
        text-align: center;
        margin-bottom: 20px;
    }

    h1 {
        color: var(--yellow-accent);
        margin: 0;
        font-size: 3em;
        font-weight: 700;
        text-transform: uppercase;
        text-shadow: 0 0 15px var(--yellow-glow);
        letter-spacing: 2px;
    }

    h2 {
        color: var(--yellow-accent);
        margin: 0;
        font-size: 1.5em;
        font-weight: 500;
    }

    /* Главная панель управления */
    .container {
        max-width: 500px;
        width: 100%;
        background-color: var(--bg-panel);
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        border: 1px solid #2a2d36;
        box-sizing: border-box;
    }

    .setup-label {
        color: var(--yellow-accent);
        font-size: 1.2em;
        margin-bottom: 15px;
        display: block;
        font-weight: 500;
    }

    /* Ползунок (Range Slider) */
    .slider-container {
        margin-bottom: 30px;
        position: relative;
    }

    input[type=range] {
        -webkit-appearance: none;
        width: 100%;
        background: transparent;
        margin: 15px 0;
    }

    input[type=range]:focus {
        outline: none;
    }

    input[type=range]::-webkit-slider-runnable-track {
        width: 100%;
        height: 8px;
        cursor: pointer;
        background: #333;
        border-radius: 4px;
    }

    input[type=range]::-webkit-slider-thumb {
        height: 24px;
        width: 24px;
        border-radius: 50%;
        background: var(--yellow-accent);
        cursor: pointer;
        -webkit-appearance: none;
        margin-top: -8px;
        box-shadow: 0 0 10px var(--yellow-glow);
    }

    .range-labels {
        display: flex;
        justify-content: space-between;
        color: #888;
        font-size: 0.9em;
    }

    .current-value {
        text-align: center;
        color: var(--yellow-accent);
        font-size: 2em;
        font-weight: 700;
        margin-top: -10px;
        margin-bottom: 20px;
    }

    /* Переключатели (Toggles) */
    .toggles-container {
        display: flex;
        flex-direction: column;
        gap: 15px;
        margin-bottom: 40px;
    }

    .toggle-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .toggle-label {
        font-size: 1.1em;
        font-weight: 500;
        letter-spacing: 1px;
    }

    .lbl-dir { color: var(--text-dir); }
    .lbl-state { color: var(--text-state); }
    .lbl-msg { color: var(--text-msg); }

    .switch {
        position: relative;
        display: inline-block;
        width: 50px;
        height: 26px;
    }

    .switch input { 
        opacity: 0;
        width: 0;
        height: 0;
    }

    .slider-toggle {
        position: absolute;
        cursor: pointer;
        top: 0; left: 0; right: 0; bottom: 0;
        background-color: #444;
        transition: .4s;
        border-radius: 34px;
    }

    .slider-toggle:before {
        position: absolute;
        content: "";
        height: 18px;
        width: 18px;
        left: 4px;
        bottom: 4px;
        background-color: white;
        transition: .4s;
        border-radius: 50%;
    }

    input:checked + .slider-toggle {
        background-color: #22c55e; /* Зеленый цвет как на скрине */
    }

    input:checked + .slider-toggle:before {
        transform: translateX(24px);
    }

    /* Кнопка */
    .generate-btn {
        display: block;
        width: 200px;
        margin: 0 auto;
        padding: 12px 20px;
        font-size: 1.2em;
        background: transparent;
        color: var(--yellow-accent);
        border: 2px solid var(--yellow-accent);
        border-radius: 25px;
        cursor: pointer;
        transition: all 0.3s;
        font-family: 'Oswald', sans-serif;
        font-weight: 500;
        letter-spacing: 1px;
    }

    .generate-btn:hover {
        background: var(--yellow-accent);
        color: var(--bg-main);
        box-shadow: 0 0 15px var(--yellow-glow);
    }

    .generate-btn:disabled {
        border-color: #555;
        color: #555;
        cursor: not-allowed;
    }

    .generate-btn:disabled:hover {
        background: transparent;
        box-shadow: none;
    }

    /* Область результатов и дизайн КАРТ */
    .result {
        margin-top: 40px;
        width: 100%;
        max-width: 1000px;
        display: none;
    }

    .position {
        margin: 20px 0;
        padding: 20px;
        background-color: var(--bg-panel);
        border-radius: 12px;
        border-left: 4px solid var(--yellow-accent);
        position: relative;
        opacity: 1;
        transform: translateY(0);
    }

    .position-title {
        font-size: 1.3em;
        color: #fff;
        margin-bottom: 15px;
        display: inline-block;
    }

    .cards-wrapper {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        margin-top: 15px;
    }

    /* Сама отрисованная карта */
    .tarot-card {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        width: 160px;
        height: 240px;
        background: linear-gradient(145deg, #252836 0%, #171923 100%);
        border: 2px solid #444;
        border-radius: 12px;
        text-decoration: none;
        color: white;
        padding: 15px;
        box-sizing: border-box;
        text-align: center;
        box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        position: relative;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .tarot-card:hover {
        transform: translateY(-10px) scale(1.05);
        box-shadow: 0 12px 30px rgba(0,0,0,0.8);
    }

    /* Анимации появления */
    .position-hidden {
        opacity: 0;
        transform: translateY(20px);
        transition: all 0.5s ease;
    }

    .card-hidden {
        opacity: 0;
        transform: translateX(-20px);
    }

    .card-searching {
        animation: searchingAnimation 0.3s ease infinite;
    }

    .card-revealed {
        opacity: 1;
        transform: translateX(0);
        transition: all 0.5s ease;
    }

    @keyframes searchingAnimation {
        0% { transform: translateX(-3px); }
        50% { transform: translateX(3px); }
        100% { transform: translateX(-3px); }
    }

    /* Текст внутри карты */
    .card-top-category {
        position: absolute;
        top: 15px;
        font-size: 0.8em;
        letter-spacing: 1px;
        text-transform: uppercase;
        opacity: 0.8;
    }

    .card-center-title {
        font-size: 1.3em;
        font-weight: 700;
        line-height: 1.2;
        text-shadow: 0 2px 4px rgba(0,0,0,0.8);
    }

    .card-bottom-type {
        position: absolute;
        bottom: 15px;
        font-size: 0.85em;
        padding: 4px 10px;
        border-radius: 12px;
        font-weight: 500;
        letter-spacing: 1px;
    }

    /* Цвета карт в зависимости от категории */
    .tarot-card.direction {
        border-color: var(--text-dir);
        box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
    }
    .tarot-card.direction .card-top-category { color: var(--text-dir); }

    .tarot-card.state {
        border-color: var(--text-state);
        box-shadow: 0 0 15px rgba(249, 115, 22, 0.2);
    }
    .tarot-card.state .card-top-category { color: var(--text-state); }

    .tarot-card.message {
        border-color: var(--text-msg);
        box-shadow: 0 0 15px rgba(168, 85, 247, 0.2);
    }
    .tarot-card.message .card-top-category { color: var(--text-msg); }

    /* Позитив / Негатив */
    .positive-badge { background-color: rgba(34, 197, 94, 0.2); color: #4ade80; border: 1px solid #22c55e; }
    .negative-badge { background-color: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid #ef4444; }

    .error {
        color: #ef4444;
        margin-top: 10px;
        display: none;
        text-align: center;
    }

    .flash {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background: white;
        opacity: 0;
        pointer-events: none;
        border-radius: 12px;
        animation: flashAnimation 1s ease-out;
    }

    @keyframes flashAnimation {
        0% { opacity: 0; }
        50% { opacity: 0.15; }
        100% { opacity: 0; }
    }

    @media (max-width: 600px) {
        .container { padding: 20px; }
        .tarot-card { width: 140px; height: 210px; }
        .card-center-title { font-size: 1.1em; }
    }
</style>

        sliderValueDisplay.textContent = this.value;
    });

    function getRandomCards() {
        // Читаем значения с тумблеров, чтобы логика стала гибче
        const categoriesPool = [];
        if (document.getElementById('toggleDir').checked) {
            categoriesPool.push({ name: "НАПРАВЛЕНИЕ", cards: Object.keys(directionCardLinks), class: "direction" });
        }
        if (document.getElementById('toggleState').checked) {
            categoriesPool.push({ name: "СОСТОЯНИЕ", cards: Object.keys(stateCardLinks), class: "state" });
        }
        if (document.getElementById('toggleMsg').checked) {
            categoriesPool.push({ name: "ПОСЛАНИЕ", cards: Object.keys(messageCardLinks), class: "message" });
        }

        if (categoriesPool.length === 0) return []; // Если все выключено

        const selectedCategories = [];
        // Берем случайное кол-во категорий (от 1 до доступного максимума)
        const randomCardCount = Math.floor(Math.random() * categoriesPool.length) + 1;

        while (selectedCategories.length < randomCardCount) {
            const randomCategoryIndex = Math.floor(Math.random() * categoriesPool.length);
            const category = categoriesPool[randomCategoryIndex];
            if (!selectedCategories.includes(category)) {
                selectedCategories.push(category);
            }
        }

        return selectedCategories.map(category => {
            const randomIndex = Math.floor(Math.random() * category.cards.length);
            const displayName = category.cards[randomIndex];
            
            return {
                name: category.name,
                displayName: displayName,
                class: category.class,
                isPositive: Math.random() >= 0.5
            };
        });
    }

    function decryptLink(encodedLink) {
        try {
            return atob(encodedLink);
        } catch (e) {
            console.error('Failed to decrypt link:', e);
            return '#';
        }
    }

    function getCardLink(category, cardName) {
        let encodedLink;
        if (category === "НАПРАВЛЕНИЕ") {
            encodedLink = directionCardLinks[cardName];
        } else if (category === "СОСТОЯНИЕ") {
            encodedLink = stateCardLinks[cardName];
        } else if (category === "ПОСЛАНИЕ") {
            encodedLink = messageCardLinks[cardName];
        }
        return encodedLink ? decryptLink(encodedLink) : '#';
    }

    async function generateReading() {
        const positionCount = parseInt(document.getElementById('positionCount').value);
        const error = document.getElementById('error');
        
        // Проверка включена ли хотя бы 1 категория
        if (!document.getElementById('toggleDir').checked && 
            !document.getElementById('toggleState').checked && 
            !document.getElementById('toggleMsg').checked) {
            error.style.display = 'block';
            return;
        }
        
        error.style.display = 'none';
        const result = document.getElementById('result');
        result.style.display = 'block';
        result.innerHTML = '';

        for(let i = 0; i < positionCount; i++) {
            const positionDiv = document.createElement('div');
            positionDiv.className = 'position position-hidden';
            
            const cards = getRandomCards();
            
            let html = `<strong class="position-title">Позиция ${i + 1}:</strong>`;
            html += `<div class="cards-wrapper">`;
            
            // Генерация HTML карточки в новом виде
            cards.forEach(card => {
                const badgeClass = card.isPositive ? 'positive-badge' : 'negative-badge';
                const typeText = card.isPositive ? 'позитив' : 'негатив';
                
                html += `
                    <a href="${getCardLink(card.name, card.displayName)}" target="_blank" class="tarot-card ${card.class} card-hidden">
                        <div class="card-top-category">${card.name}</div>
                        <div class="card-center-title">${card.displayName}</div>
                        <div class="card-bottom-type ${badgeClass}">${typeText}</div>
                    </a>`;
            });
            
            html += `</div>`;
            positionDiv.innerHTML = html;
            result.appendChild(positionDiv);
            
            await new Promise(resolve => setTimeout(resolve, 500));
            positionDiv.classList.remove('position-hidden');
            
            const flash = document.createElement('div');
            flash.className = 'flash';
            positionDiv.appendChild(flash);
            
            const cardElements = positionDiv.querySelectorAll('.tarot-card');
            for(let card of cardElements) {
                await new Promise(resolve => {
                    setTimeout(() => {
                        card.classList.add('card-searching');
                        setTimeout(() => {
                            card.classList.remove('card-searching');
                            card.classList.remove('card-hidden');
                            card.classList.add('card-revealed');
                            resolve();
                        }, 1500); // чуть ускорил анимацию поиска для удобства
                    }, 100);
                });
            }
            
            setTimeout(() => flash.remove(), 1000);
            await new Promise(resolve => setTimeout(resolve, 300));
        }
    }

    const generateBtn = document.getElementById('generateBtn');
    
    // Проверка тумблеров для блокировки кнопки
    const toggles = [document.getElementById('toggleDir'), document.getElementById('toggleState'), document.getElementById('toggleMsg')];
    
    toggles.forEach(t => t.addEventListener('change', () => {
        const anyChecked = toggles.some(toggle => toggle.checked);
        generateBtn.disabled = !anyChecked;
        document.getElementById('error').style.display = anyChecked ? 'none' : 'block';
    }));

    generateBtn.addEventListener('click', () => {
        animateButton();
        generateReading();
    });
</script>
